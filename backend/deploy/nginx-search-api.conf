# nginx reverse-proxy so the phone can reach the Python search service over HTTPS.
#
# Why this is needed: iOS App Transport Security blocks plaintext http:// to
# non-localhost hosts, and uvicorn on :8000 has no TLS. So we expose it under the
# existing TLS vhost as a subpath that proxies to 127.0.0.1:8000.
#
# Paste this INSIDE the existing `server { ... }` block that already terminates
# TLS for free-spotify.duckdns.org (the same one the Node backend uses), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Result: the app's SEARCH_BACKEND_URL = https://free-spotify.duckdns.org/search-api
# iOS calls .../search-api/search  ->  nginx strips /search-api/  ->  127.0.0.1:8000/search

location /search-api/ {
    proxy_pass http://127.0.0.1:8000/;   # trailing slash strips the /search-api/ prefix
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # POST body + JSON response are small; default buffering is fine.
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
}
