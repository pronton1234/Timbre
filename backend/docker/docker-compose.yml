# Main services: MeiliSearch for full-text catalog search.
# Run alongside the Node backend (which starts via systemd / node server.js directly).
#
# Deploy:
#   cd ~/spotify-free-backend/docker
#   docker compose up -d
#   docker compose logs -f
#
# MeiliSearch admin key is set via MEILI_MASTER_KEY env var.
# The Node backend connects at http://127.0.0.1:7700 using the same key.

services:
  meili:
    image: getmeili/meilisearch:v1.11
    container_name: meili
    restart: unless-stopped
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-changeme-in-prod}"
      MEILI_ENV: "production"
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  meili_data:
